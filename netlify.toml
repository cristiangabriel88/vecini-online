[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Block source map files from public access. Maps are emitted with
# sourcemap: 'hidden' (no //# sourceMappingURL comment in JS files) and
# uploaded to the private Supabase Storage bucket. The CDN redirect
# ensures the files cannot be fetched even though they are deployed
# alongside the JS assets (T258b).
[[redirects]]
  from = "/assets/*.js.map"
  to = "/404"
  status = 404
  force = true

[functions]
  node_bundler = "esbuild"

[functions."health-probe"]
  schedule = "*/5 * * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
    # Force HTTPS for two years, include subdomains, and request HSTS preload.
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Content Security Policy. The app is fully self-hosted (no external fonts or
    # CDNs); the only outbound connections are to Supabase (REST + Realtime
    # WebSocket) over the project domain. Inline styles are allowed because the
    # motion layer sets element style attributes; inline scripts are not.
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; frame-src 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.supabase.co; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; worker-src 'self' blob:; manifest-src 'self'; report-to csp-endpoint; report-uri /.netlify/functions/csp-report; upgrade-insecure-requests"
    Report-To = '{"group":"csp-endpoint","max_age":86400,"endpoints":[{"url":"/.netlify/functions/csp-report"}]}'
    Reporting-Endpoints = 'csp-endpoint="/.netlify/functions/csp-report"'
    # Isolate the browsing context and cross-origin resource sharing.
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    X-DNS-Prefetch-Control = "off"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
