# Netlify configuration for the SEPARATE superadmin platform site (T93).
#
# The superadmin console ships in the same monorepo but is deployed as its own
# Netlify site on its own subdomain (e.g. hub.vecini.online), so it has a
# distinct origin: an XSS in the resident/admin app physically cannot reach a
# superadmin session token, and the superadmin's privileged bundle is never
# served to regular users. See DECISIONS.md ("Superadmin is a separate app on
# its own subdomain").
#
# Build pipeline:
#   npm run build:platform
#     1. tsc --noEmit + vite build  ->  dist/  (both index.html + platform.html)
#     2. scripts/prepare-platform-deploy.mjs
#          copies dist/platform.html -> dist-platform/index.html
#          copies dist/assets/       -> dist-platform/assets/
#   Netlify then deploys from dist-platform/.
#
# Why a separate output dir?
#   Rewiring the SPA catch-all to /platform.html (a non-standard name) caused
#   some Netlify CDN edges to serve platform.html with text/html for /assets/*
#   requests, breaking browser ES module strict-MIME checks. Using /index.html
#   (the conventional SPA entry) in an isolated directory avoids this entirely.
#   The explicit /assets/* passthrough below is a belt-and-suspenders guard.

[build]
  command = "npm run build:platform"
  publish = "dist-platform"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Explicitly pass through real static assets before the SPA catch-all.
# This prevents the catch-all from ever rewriting /assets/* requests, even if
# Netlify's CDN edge does not perform file-existence checks before applying rules.
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

# SPA fallback: any path that does not match a real file resolves to index.html
# (which is dist/platform.html, copied by the build step above).
# status = 200 without force = true means real files are always served directly.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Tightest CSP for the operator origin: only self + the Supabase project, no
    # external origins at all. No inline scripts; inline styles are allowed only
    # because the motion layer sets element style attributes. No framing, no
    # cross-origin embedding. Discourage indexing of the operator surface.
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; frame-src 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; worker-src 'self' blob:; manifest-src 'self'; report-to csp-endpoint; report-uri /.netlify/functions/csp-report; upgrade-insecure-requests"
    Report-To = '{"group":"csp-endpoint","max_age":86400,"endpoints":[{"url":"/.netlify/functions/csp-report"}]}'
    Reporting-Endpoints = 'csp-endpoint="/.netlify/functions/csp-report"'
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"
    X-DNS-Prefetch-Control = "off"
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
